<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agujero Negro 💫</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial;}
canvas { position:absolute; }
.boton {
 position:fixed; bottom:20px; left:20px;
 padding:10px 15px; background:#ff69b4;
 border:none; border-radius:10px; cursor:pointer;
}
</style>
</head>
<body>

<button class="boton" onclick="musica()">🎵 Música</button>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let scale = 1;
let offsetX = 0, offsetY = 0;
let isDragging = false;
let startX, startY;

// frases
const frases = [
"Te amo💕","Eres mi todo💖","Mi luz🤍","Mi princesita 🌹",
"Mi niña hermosha 🤍","Mi Mujer 💗","Mi enanita ❤️",
"Mi esposha ✨","Mi vida entera 💫"
];

// estrellas
let estrellas = [];
for(let i=0;i<300;i++){
 estrellas.push({
   x: Math.random()*2000-1000,
   y: Math.random()*2000-1000,
   r: Math.random()*2
 });
}

// dibujo
function draw(){
 ctx.setTransform(1,0,0,1,0,0);
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.translate(canvas.width/2 + offsetX, canvas.height/2 + offsetY);
 ctx.scale(scale, scale);

 // estrellas
 ctx.fillStyle="white";
 estrellas.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
   ctx.fill();
 });

 // agujero negro
 ctx.beginPath();
 ctx.fillStyle="black";
 ctx.arc(0,0,80,0,Math.PI*2);
 ctx.fill();

 // anillo
 ctx.strokeStyle="purple";
 ctx.lineWidth=10;
 ctx.beginPath();
 ctx.arc(0,0,120,0,Math.PI*2);
 ctx.stroke();

 // frases en círculo
 let radius = 200;
 for(let i=0;i<frases.length*3;i++){
   let angle = (i/(frases.length*3))*Math.PI*2;
   let x = Math.cos(angle)*radius;
   let y = Math.sin(angle)*radius;

   ctx.save();
   ctx.translate(x,y);
   ctx.rotate(angle);
   ctx.fillStyle="white";
   ctx.font="18px Arial";
   ctx.fillText(frases[i % frases.length],0,0);
   ctx.restore();
 }

 requestAnimationFrame(draw);
}
draw();

// drag
canvas.addEventListener("mousedown",e=>{
 isDragging=true;
 startX=e.clientX-offsetX;
 startY=e.clientY-offsetY;
});
canvas.addEventListener("mousemove",e=>{
 if(isDragging){
  offsetX=e.clientX-startX;
  offsetY=e.clientY-startY;
 }
});
canvas.addEventListener("mouseup",()=>isDragging=false);

// touch drag
canvas.addEventListener("touchstart",e=>{
 isDragging=true;
 startX=e.touches[0].clientX-offsetX;
 startY=e.touches[0].clientY-offsetY;
});
canvas.addEventListener("touchmove",e=>{
 if(isDragging){
  offsetX=e.touches[0].clientX-startX;
  offsetY=e.touches[0].clientY-startY;
 }
});
canvas.addEventListener("touchend",()=>isDragging=false);

// zoom con rueda
canvas.addEventListener("wheel",e=>{
 scale += e.deltaY * -0.001;
 scale = Math.min(Math.max(.5, scale), 3);
});

// zoom táctil
let lastDist = null;
canvas.addEventListener("touchmove", e=>{
 if(e.touches.length==2){
   let dx = e.touches[0].clientX - e.touches[1].clientX;
   let dy = e.touches[0].clientY - e.touches[1].clientY;
   let dist = Math.sqrt(dx*dx+dy*dy);

   if(lastDist){
     scale *= dist/lastDist;
     scale = Math.min(Math.max(.5, scale), 3);
   }
   lastDist = dist;
 }
});
canvas.addEventListener("touchend",()=> lastDist=null);

// música
function musica(){
 window.open("https://www.youtube.com/watch?v=4JZ-o3iAJv4","_blank");
}
</script>

</body>
</html>
